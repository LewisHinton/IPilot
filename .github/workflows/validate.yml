name: Validate

on:
  push:
  pull_request:

jobs:
  release-readiness:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: Run release-readiness checks
        run: python scripts/check_release_readiness.py
